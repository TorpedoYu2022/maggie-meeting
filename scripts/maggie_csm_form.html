<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会议纪要确认 - Maggie</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #333;
    line-height: 1.6;
}
.container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
}
.form-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 32px;
    margin-bottom: 20px;
}
.form-header {
    text-align: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid #FF6B35;
}
.form-header h1 {
    color: #1A1A2E;
    font-size: 24px;
    margin-bottom: 8px;
}
.form-header p {
    color: #888;
    font-size: 14px;
}
.section-title {
    color: #FF6B35;
    font-size: 18px;
    font-weight: bold;
    margin: 28px 0 16px 0;
    padding-left: 12px;
    border-left: 4px solid #FF6B35;
}
.field-group {
    margin-bottom: 18px;
}
.field-label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
    color: #444;
    font-size: 14px;
}
.field-label .required {
    color: #e74c3c;
    margin-left: 4px;
}
.field-label .hint {
    color: #999;
    font-weight: 400;
    font-size: 12px;
    margin-left: 8px;
}
input[type="text"],
input[type="number"],
input[type="date"],
textarea,
select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    transition: border-color 0.2s;
    font-family: inherit;
}
input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #FF6B35;
    box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
}
textarea {
    resize: vertical;
    min-height: 80px;
}
.row {
    display: flex;
    gap: 16px;
}
.row .field-group {
    flex: 1;
}
.spcacard {
    border: 2px solid #f0f0f0;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    background: #fafafa;
}
.spcacard .spca-title {
    font-weight: bold;
    color: #1A1A2E;
    margin-bottom: 8px;
    font-size: 15px;
}
.spcacard .spca-subtitle {
    color: #888;
    font-size: 12px;
    margin-bottom: 10px;
}
.submit-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: #FF6B35;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 10px;
}
.submit-btn:hover {
    background: #e55a2b;
}
.submit-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
}
.footer {
    text-align: center;
    color: #999;
    font-size: 12px;
    margin-top: 20px;
    padding: 16px;
}
/* 加载动画 */
.loading {
    display: none;
    text-align: center;
    padding: 20px;
}
.loading .spinner {
    border: 3px solid #f0f0f0;
    border-top: 3px solid #FF6B35;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
}
@keyframes spin {
    to { transform: rotate(360deg); }
}
/* 成功提示 */
.success-msg {
    display: none;
    text-align: center;
    padding: 40px 20px;
}
.success-msg .icon {
    font-size: 48px;
    margin-bottom: 16px;
}
.success-msg h2 {
    color: #27ae60;
    margin-bottom: 8px;
}
.success-msg p {
    color: #666;
}
</style>
</head>
<body>

<div class="container">

<!-- 表单头部 -->
<div class="form-card">
    <div class="form-header">
        <h1>📋 会议纪要确认</h1>
        <p>请确认本次会议信息，提交后将写入 Salesforce</p>
    </div>

    <form id="csmForm">

        <!-- 第一部分：基本信息 -->
        <div class="section-title">📌 基本信息</div>

        <div class="field-group">
            <label class="field-label">
                客户<span class="required">*</span>
            </label>
            <select id="client" name="ExistedAccount__c" required>
                <option value="">请选择客户</option>
            </select>
        </div>

        <div class="row">
            <div class="field-group">
                <label class="field-label">
                    服务时间<span class="required">*</span>
                </label>
                <input type="date" id="serviceDate" name="date__c" required>
            </div>
            <div class="field-group">
                <label class="field-label">
                    拜访方式<span class="required">*</span>
                </label>
                <select id="visitMethod" name="VisitMethod__c" required>
                    <option value="">请选择</option>
                    <option value="线上">线上</option>
                    <option value="线下">线下</option>
                    <option value="电话">电话</option>
                </select>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">
                服务大类<span class="required">*</span>
            </label>
            <select id="serviceType" name="ActivityType__c" required>
                <option value="">请选择</option>
                <option value="定制沟通">定制沟通</option>
                <option value="日常服务">日常服务</option>
                <option value="项目实施">项目实施</option>
                <option value="续约沟通">续约沟通</option>
                <option value="投诉处理">投诉处理</option>
                <option value="培训">培训</option>
                <option value="其他">其他</option>
            </select>
        </div>

        <!-- 第二部分：参会人 -->
        <div class="section-title">👥 参会人</div>

        <div class="field-group">
            <label class="field-label">
                参会人（客户方）<span class="required">*</span>
            </label>
            <textarea id="customerAttendees" name="attendAcount__c" placeholder="客户方参会人员姓名，多人用逗号分隔" required></textarea>
        </div>

        <div class="field-group">
            <label class="field-label">
                参会人（我方）<span class="required">*</span>
                <span class="hint">多人用英文 ; 隔开</span>
            </label>
            <textarea id="ourAttendees" name="AttendMe__c" placeholder="例如：常云;于雷" required></textarea>
        </div>

        <div class="row">
            <div class="field-group">
                <label class="field-label">
                    KP参与<span class="required">*</span>
                    <span class="hint">客户关键决策人是否参会</span>
                </label>
                <select id="kpJoin" name="KP__c" required>
                    <option value="">请选择</option>
                    <option value="是">是</option>
                    <option value="否">否</option>
                </select>
            </div>
            <div class="field-group">
                <label class="field-label">
                    是否深度服务<span class="required">*</span>
                </label>
                <select id="deepService" name="DeepService__c" required>
                    <option value="">请选择</option>
                    <option value="是">是</option>
                    <option value="否">否</option>
                </select>
            </div>
        </div>

        <!-- 第三部分：工时 -->
        <div class="section-title">⏱️ 工时</div>

        <div class="row">
            <div class="field-group">
                <label class="field-label">
                    准备工时（小时）<span class="required">*</span>
                </label>
                <input type="number" id="prepareTime" name="PrepareTime__c" step="0.5" min="0" placeholder="0" required>
            </div>
            <div class="field-group">
                <label class="field-label">
                    服务工时（小时）<span class="required">*</span>
                </label>
                <input type="number" id="effort" name="Effort__c" step="0.5" min="0" placeholder="0" required>
            </div>
        </div>

        <!-- 第四部分：服务评估 -->
        <div class="section-title">📊 服务评估</div>

        <div class="field-group">
            <label class="field-label">
                续约判断<span class="required">*</span>
            </label>
            <select id="renewal" name="Renewal__c" required>
                <option value="">请选择</option>
                <option value="大概率续约">大概率续约</option>
                <option value="可能续约">可能续约</option>
                <option value="续约有风险">续约有风险</option>
                <option value="大概率不续约">大概率不续约</option>
                <option value="不续约">不续约</option>
            </select>
        </div>

        <div class="field-group">
            <label class="field-label">
                服务详情
            </label>
            <textarea id="serviceDetail" name="ServiceDetail__c" placeholder="简要描述本次服务内容"></textarea>
        </div>

        <!-- 第五部分：SPCA 会议纪要 -->
        <div class="section-title">📝 SPCA 会议纪要</div>

        <div class="spcacard">
            <div class="spca-title">🟢 S - Situation（背景）</div>
            <div class="spca-subtitle">客户背景、当前现状</div>
            <textarea id="spca_s" name="Situation" placeholder="客户背景情况、当前使用现状..."></textarea>
        </div>

        <div class="spcacard">
            <div class="spca-title">🔴 P - Pain/Problem（痛点）</div>
            <div class="spca-subtitle">客户面临的痛点问题</div>
            <textarea id="spca_p" name="Pain" placeholder="客户核心痛点、具体问题..."></textarea>
        </div>

        <div class="spcacard">
            <div class="spca-title">🟡 C - Consensus（共识）</div>
            <div class="spca-subtitle">双方达成的共识和不共识</div>
            <textarea id="spca_c" name="Consensus" placeholder="✅ 共识的点&#10;❌ 不共识的点（待进一步讨论）"></textarea>
        </div>

        <div class="spcacard">
            <div class="spca-title">🔵 A - Action（行动）</div>
            <div class="spca-subtitle">下一步行动项</div>
            <textarea id="spca_a" name="Action" placeholder="| 事项 | 负责人 | 截止时间 |&#10;|------|--------|----------|&#10;| xxx  | xxx    | xxx     |"></textarea>
        </div>

        <!-- 第六部分：补充信息 -->
        <div class="section-title">📎 补充信息</div>

        <div class="field-group">
            <label class="field-label">
                客户反馈的问题
            </label>
            <textarea id="feedback" name="Feedback__c" placeholder="客户在会议中反馈的问题..."></textarea>
        </div>

        <div class="field-group">
            <label class="field-label">
                未解决事项和风险
            </label>
            <textarea id="risk" name="UnresolveIssueRisk__c" placeholder="需要关注的风险事项..."></textarea>
        </div>

        <!-- 提交按钮 -->
        <button type="submit" class="submit-btn" id="submitBtn">
            ✅ 提交确认
        </button>

    </form>
</div>

<!-- 加载中 -->
<div class="form-card loading" id="loading">
    <div class="spinner"></div>
    <p>正在提交到 Salesforce...</p>
</div>

<!-- 提交成功 -->
<div class="form-card success-msg" id="success">
    <div class="icon">✅</div>
    <h2>提交成功！</h2>
    <p>会议纪要已写入 Salesforce，感谢确认。</p>
</div>

<div class="footer">
    📅 Maggie · 牛逼轰轰市场部 · 自动生成
</div>

</div>

<script>
// 从 URL 获取参数
const urlParams = new URLSearchParams(window.location.search);
const meetingId = urlParams.get('meeting_id') || '';
const clientName = urlParams.get('client') || '';

// 如果 URL 带了客户名，自动填充
if (clientName) {
    document.getElementById('client').value = clientName;
}

// 设置默认日期为今天
document.getElementById('serviceDate').valueAsDate = new Date();

// 获取客户列表
async function loadClients() {
    try {
        const sfToken = await getSalesforceToken();
        const response = await fetch(
            '/api/salesforce/accounts',
            {
                headers: { 'Authorization': `Bearer ${sfToken}` }
            }
        );
        if (response.ok) {
            const accounts = await response.json();
            const select = document.getElementById('client');
            accounts.forEach(acc => {
                const option = document.createElement('option');
                option.value = acc.Id;
                option.textContent = acc.Name;
                select.appendChild(option);
            });
            // 恢复 URL 传入的值
            if (clientName) select.value = clientName;
        }
    } catch (e) {
        console.log('客户列表加载失败，使用手动输入');
    }
}

// 表单提交
document.getElementById('csmForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    document.getElementById('loading').style.display = 'block';

    // 收集表单数据
    const formData = {
        // 基本信息
        ExistedAccount__c: document.getElementById('client').value,
        date__c: document.getElementById('serviceDate').value,
        VisitMethod__c: document.getElementById('visitMethod').value,
        ActivityType__c: document.getElementById('serviceType').value,
        // 参会人
        attendAcount__c: document.getElementById('customerAttendees').value,
        AttendMe__c: document.getElementById('ourAttendees').value,
        KP__c: document.getElementById('kpJoin').value,
        DeepService__c: document.getElementById('deepService').value,
        // 工时
        PrepareTime__c: parseFloat(document.getElementById('prepareTime').value) || 0,
        Effort__c: parseFloat(document.getElementById('effort').value) || 0,
        // 评估
        Renewal__c: document.getElementById('renewal').value,
        ServiceDetail__c: document.getElementById('serviceDetail').value,
        // SPCA 纪要
        meetingminutes__c: `S - 背景：${document.getElementById('spca_s').value}\nP - 痛点：${document.getElementById('spca_p').value}\nC - 共识：${document.getElementById('spca_c').value}`,
        PromiseTodo__c: document.getElementById('spca_c').value,
        LaterPlan__c: document.getElementById('spca_a').value,
        // 补充
        Feedback__c: document.getElementById('feedback').value,
        UnresolveIssueRisk__c: document.getElementById('risk').value,
        // 会议关联
        meetingId: meetingId
    };

    try {
        // 发送到后端
        const response = await fetch('/api/maggie/submit-csm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        });

        if (response.ok) {
            document.getElementById('csmForm').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        } else {
            throw new Error('提交失败');
        }
    } catch (error) {
        alert('提交失败，请稍后重试。错误：' + error.message);
        submitBtn.disabled = false;
        document.getElementById('loading').style.display = 'none';
    }
});

// 页面加载时获取客户列表
loadClients();
</script>

</body>
</html>
